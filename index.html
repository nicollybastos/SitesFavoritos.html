<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meus Sites Favoritos - Nicolly</title>
    <style>
        /* Estilo ultra fiel à Captura de Tela 2026-04-30 às 18.54.56.png */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial Narrow', sans-serif;
            background-color: #ffffff;
        }

        /* Cabeçalho com ondas suaves */
        header {
            background-color: #fce4ec;
            background-image: linear-gradient(to bottom, rgba(255,255,255,0.3), transparent), 
                              url('data:image/svg+xml;utf8,<svg viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg"><path fill="%23f06292" fill-opacity="0.3" d="M0,160L80,181.3C160,203,320,245,480,234.7C640,224,800,160,960,138.7C1120,117,1280,139,1360,149.3L1440,160L1440,0L1360,0C1280,0,1120,0,960,0C800,0,640,0,480,0C320,0,160,0,80,0L0,0Z"></path></svg>');
            background-size: cover;
            padding: 50px 0 20px 0;
            text-align: center;
            position: relative;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .user-avatar {
            background-color: #673ab7;
            color: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        h1 {
            font-family: 'Impact', sans-serif;
            font-size: 65px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        /* Barra roxa do nome que atravessa o topo */
        .name-bar {
            background-color: #b39ddb;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            font-size: 18px;
            padding: 4px 50px;
            display: inline-block;
            margin-top: -5px;
            position: relative;
            z-index: 5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Faixa Rosa Choque */
        .magenta-divider {
            height: 12px;
            background-color: #e91e63;
            width: 100%;
            margin-top: 30px;
        }

        /* Layout Horizontal dos Sites */
        .content-row {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 10px;
            gap: 10px;
        }

        .site-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 210px;
        }

        .site-label {
            font-weight: 900;
            font-size: 14px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .logo-container {
            background-color: #e91e63; /* Rosa das logos no seu print */
            width: 200px;
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .logo-container img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
        }

        /* Botão "BOTÃO LINK DO SITE" */
        .link-button {
            background-color: #eceff1;
            color: #673ab7;
            text-decoration: none;
            padding: 12px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 12px;
            width: 100%;
            text-align: center;
            border: 1px solid #cfd8dc;
            text-transform: uppercase;
        }

        /* Setas cinzas entre os sites */
        .nav-arrow {
            width: 60px;
            height: 60px;
            background-color: #e0e0e0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 35px;
            font-weight: bold;
            margin-top: 45px; /* Alinhado ao centro da logo */
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="user-avatar">👤</div>
            <h1>Meus sites favoritos</h1>
        </div>
        <div class="name-bar">NICOLI GÓES BASTOS</div>
    </header>

    <div class="magenta-divider"></div>

    <div class="content-row">
        <!-- Site 1 -->
        <div class="site-card">
            <div class="site-label">LinkedIn</div>
            <div class="logo-container">
                <img src="linkedin.jpeg" alt="LinkedIn">
            </div>
            <a href="https://www.linkedin.com" class="link-button" target="_blank">BOTÃO LINK DO SITE</a>
        </div>

        <div class="nav-arrow">❯</div>

        <!-- Site 2 -->
        <div class="site-card">
            <div class="site-label">TikTok</div>
            <div class="logo-container">
                <img src="tiktok.jpeg" alt="TikTok">
            </div>
            <a href="https://www.tiktok.com" class="link-button" target="_blank">BOTÃO LINK DO SITE</a>
        </div>

        <div class="nav-arrow">❯</div>

        <!-- Site 3 -->
        <div class="site-card">
            <div class="site-label">Instagram</div>
            <div class="logo-container">
                <img src="instagram.jpeg" alt="Instagram">
            </div>
            <a href="https://www.instagram.com" class="link-button" target="_blank">BOTÃO LINK DO SITE</a>
        </div>

        <div class="nav-arrow">❯</div>

        <!-- Site 4 -->
        <div class="site-card">
            <div class="site-label">WhatsApp</div>
            <div class="logo-container">
                <img src="whatsapp.jpeg" alt="WhatsApp">
            </div>
            <a href="https://web.whatsapp.com" class="link-button" target="_blank">BOTÃO LINK DO SITE</a>
        </div>
    </div>

</body>
</html>
