<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meus sites favoritos</title>
    <style>
        /* Reset básico */
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: #fff;
        }

        /* Cabeçalho Rosa Ondulado */
        header {
            background-color: #fce4ec;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg"><path fill="%23f06292" fill-opacity="0.2" d="M0,160L48,176C96,192,192,224,288,224C384,224,480,192,576,165.3C672,139,768,117,864,128C960,139,1056,181,1152,197.3C1248,213,1344,203,1392,197.3L1440,192L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"></path></svg>');
            background-size: cover;
            padding: 40px 20px;
            text-align: center;
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .user-icon {
            background-color: #673ab7;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
        }

        h1 {
            font-family: 'Arial Narrow', sans-serif;
            font-size: 55px;
            margin: 0;
            text-transform: uppercase;
            font-weight: bold;
        }

        .name-tag {
            background-color: #b39ddb;
            color: white;
            display: inline-block;
            padding: 5px 40px;
            font-weight: bold;
            font-size: 18px;
            margin-top: -5px;
        }

        /* Linha Rosa Choque separadora */
        .pink-bar {
            height: 10px;
            background-color: #e91e63;
            width: 100%;
        }

        /* Container dos Sites Lado a Lado */
        .sites-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 10px;
            gap: 15px;
            overflow-x: auto; /* Permite rolar se a tela for pequena */
        }

        .site-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 220px;
        }

        .site-name {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .logo-placeholder {
            background-color: #e91e63;
            width: 200px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .logo-placeholder img {
            max-width: 85%;
            max-height: 85%;
        }

        /* Botão arredondado cinza */
        .site-link {
            background-color: #f0f0f0;
            color: #673ab7;
            text-decoration: none;
            padding: 10px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 13px;
            width: 100%;
            text-align: center;
            border: 1px solid #ddd;
        }

        /* Seta cinza entre os sites */
        .arrow-next {
            background-color: #e0e0e0;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
            margin-top: 40px; /* Alinha com a logo */
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="user-icon">👤</div>
            <h1>Meus sites favoritos</h1>
        </div>
        <div class="name-tag">NICOLI GÓES BASTOS</div>
    </header>

    <div class="pink-bar"></div>

    <div class="sites-wrapper">
        <!-- Site 1 -->
        <div class="site-column">
            <div class="site-name">LinkedIn</div>
            <div class="logo-placeholder">
                <img src="linkedin.jpeg" alt="LinkedIn">
            </div>
            <a href="https://www.linkedin.com" class="site-link" target="_blank">BOTÃO LINK DO SITE</a>
        </div>

        <!-- Seta -->
        <div class="arrow-next">❯</div>

        <!-- Site 2 -->
        <div class="site-column">
            <div class="site-name">TikTok</div>
            <div class="logo-placeholder">
                <img src="tiktok.jpeg" alt="TikTok">
            </div>
            <a href="https://www.tiktok.com" class="site-link" target="_blank">BOTÃO LINK DO SITE</a>
        </div>

        <!-- Seta -->
        <div class="arrow-next">❯</div>

        <!-- Site 3 -->
        <div class="site-column">
            <div class="site-name">Instagram</div>
            <div class="logo-placeholder">
                <img src="instagram.jpeg" alt="Instagram">
            </div>
            <a href="https://www.instagram.com" class="site-link" target="_blank">BOTÃO LINK DO SITE</a>
        </div>

        <!-- Seta -->
        <div class="arrow-next">❯</div>

        <!-- Site 4 -->
        <div class="site-column">
            <div class="site-name">WhatsApp</div>
            <div class="logo-placeholder">
                <img src="whatsapp.jpeg" alt="WhatsApp">
            </div>
            <a href="https://web.whatsapp.com" class="site-link" target="_blank">BOTÃO LINK DO SITE</a>
        </div>
    </div>

</body>
</html>
