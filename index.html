<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meus Sites Favoritos - Nicolly</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial Narrow', sans-serif;
            background-color: #ffffff;
        }

        header {
            background-color: #fce4ec;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg"><path fill="%23f06292" fill-opacity="0.3" d="M0,160L80,181.3C160,203,320,245,480,234.7C640,224,800,160,960,138.7C1120,117,1280,139,1360,149.3L1440,160L1440,0L1360,0C1280,0,1120,0,960,0C800,0,640,0,480,0C320,0,160,0,80,0L0,0Z"></path></svg>');
            background-size: cover;
            padding: 50px 0 20px 0;
            text-align: center;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .user-avatar {
            background-color: #673ab7;
            color: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        h1 {
            font-family: 'Impact', sans-serif;
            font-size: clamp(30px, 8vw, 65px);
            margin: 0;
            text-transform: uppercase;
        }

        .name-bar {
            background-color: #b39ddb;
            color: #ffffff;
            font-weight: bold;
            font-size: 18px;
            padding: 4px 50px;
            display: inline-block;
            margin-top: -5px;
        }

        .magenta-divider {
            height: 12px;
            background-color: #e91e63;
            width: 100%;
            margin-top: 30px;
        }

        .content-column {
            display: flex;
            flex-direction: column !important;
            align-items: center;
            width: 100%;
            padding: 40px 0;
            gap: 60px; 
        }

        .site-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 280px;
        }

        .site-label {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .logo-container {
            width: 100%;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            background-color: transparent;
        }

        .logo-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .link-button {
            background-color: #f1f3f4;
            color: #673ab7;
            text-decoration: none;
            padding: 15px;
            border-radius: 35px;
            font-weight: bold;
            font-size: 14px;
            width: 100%;
            text-align: center;
            border: 1px solid #ddd;
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <h1>Meus sites favoritos</h1>
        </div>
        <div class="name-bar">NICOLLY GÓES BASTOS</div>
    </header>

    <div class="magenta-divider"></div>
    
    <div class="content-column">
        
        <div class="site-card">
            <div class="site-label">LinkedIn</div>
            <div class="logo-container">
                <img src="linkedin.jpeg" alt="LinkedIn">
            </div>
            <a href="https://www.linkedin.com" class="link-button" target="_blank">BOTÃO LINK DO SITE</a>
        </div>

        <div class="site-card">
            <div class="site-label">TikTok</div>
            <div class="logo-container">
                <img src="tiktok.jpeg" alt="TikTok">
            </div>
            <a href="https://www.tiktok.com" class="link-button" target="_blank">BOTÃO LINK DO SITE</a>
        </div>

        <div class="site-card">
            <div class="site-label">Instagram</div>
            <div class="logo-container">
                <img src="instagram.jpeg" alt="Instagram">
            </div>
            <a href="https://www.instagram.com" class="link-button" target="_blank">BOTÃO LINK DO SITE</a>
        </div>

        <div class="site-card">
            <div class="site-label">WhatsApp</div>
            <div class="logo-container">
                <img src="whatsapp.jpeg" alt="WhatsApp">
            </div>
            <a href="https://web.whatsapp.com" class="link-button" target="_blank">BOTÃO LINK DO SITE</a>
        </div>

        <div class="site-card">
            <div class="site-label">Spotify</div>
            <div class="logo-container">
                <img src="spotify.jpeg" alt="Spotify">
            </div>
            <a href="https://www.spotify.com" class="link-button" target="_blank">BOTÃO LINK DO SITE</a>
        </div>

    </div>

</body>
</html>
